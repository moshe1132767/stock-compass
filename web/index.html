<!doctype html>
<html lang="he" dir="rtl" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" id="themeColor" content="#F6F7F9">
<title>trade</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"trade","short_name":"trade","display":"standalone","background_color":"%23F6F7F9","theme_color":"%23F6F7F9","icons":[]}'>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root, :root[data-theme="light"]{
    --bg:#F6F7F9; --surface:#FFFFFF; --surface2:#F0F2F5; --surface3:#E7EAEF;
    --border:rgba(11,14,17,.09); --border2:#E2E6EB;
    --txt:#0B0E11; --muted:#6B7280; --dim:#9CA3AF;
    --brand:#00A76A; --up:#059669; --up-wash:rgba(5,150,105,.10);
    --down:#DC2626; --down-wash:rgba(220,38,38,.09);
    --neu:#6B7280; --neu-wash:rgba(11,14,17,.05);
    --sbuy:#047857; --buy:#10B981; --hold:#9CA3AF; --sell:#F87171; --ssell:#DC2626;
    --pill-txt:#FFFFFF;
    --shadow:0 1px 2px rgba(11,14,17,.06), 0 1px 3px rgba(11,14,17,.04);
  }
  :root[data-theme="dark"]{
    --bg:#0B0E11; --surface:#14171C; --surface2:#1C2027; --surface3:#262B34;
    --border:rgba(255,255,255,.07); --border2:#2A2E39;
    --txt:#E6E8EB; --muted:#8B929E; --dim:#5B616E;
    --brand:#00D37F; --up:#00D37F; --up-wash:rgba(0,211,127,.13);
    --down:#F6465D; --down-wash:rgba(246,70,93,.13);
    --neu:#8B929E; --neu-wash:rgba(255,255,255,.06);
    --sbuy:#00D37F; --buy:#34D399; --hold:#8B929E; --sell:#FB7185; --ssell:#F6465D;
    --pill-txt:#04150D;
    --shadow:none;
  }
  .num{font-variant-numeric:tabular-nums lining-nums;font-feature-settings:"tnum" 1,"lnum" 1;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",system-ui,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{max-width:620px;margin:0 auto;min-height:100vh;padding-bottom:calc(40px + env(safe-area-inset-bottom));
    transition:background .2s,color .2s;}
  .hidden{display:none !important;}
  button{font-family:inherit;}

  /* header */
  header{position:sticky;top:0;z-index:40;background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .mark{width:30px;height:30px;border-radius:9px;flex:none;
    background:linear-gradient(150deg,#0E1B2E,#0A0F1A);display:grid;place-items:center;}
  .wordmark{font-weight:800;font-size:21px;letter-spacing:-.5px;}
  .wordmark .t{color:var(--brand);}
  .hbtns{display:flex;gap:8px;}
  .icon-btn{background:var(--surface);border:1px solid var(--border2);color:var(--txt);
    width:42px;height:42px;border-radius:12px;display:grid;place-items:center;cursor:pointer;
    transition:transform .08s,background .15s;box-shadow:var(--shadow);}
  .icon-btn:active{transform:scale(.92);background:var(--surface2);}
  .spin{animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* search + autocomplete */
  .searchwrap{position:relative;padding:14px 16px 6px;}
  .searchrow{display:flex;gap:9px;}
  .searchrow input{flex:1;background:var(--surface);border:1px solid var(--border2);color:var(--txt);
    border-radius:12px;padding:14px 15px;font-size:16px;outline:none;transition:border-color .15s;
    box-shadow:var(--shadow);}
  .searchrow input::placeholder{color:var(--dim);}
  .searchrow input:focus{border-color:var(--brand);}
  .searchrow button{background:var(--brand);border:none;color:#fff;font-weight:800;
    border-radius:12px;padding:0 20px;font-size:15px;cursor:pointer;min-height:50px;}
  .searchrow button:active{transform:scale(.95);}
  .suggest{position:absolute;left:16px;right:16px;top:calc(100% - 2px);z-index:50;
    background:var(--surface);border:1px solid var(--border2);border-radius:14px;
    box-shadow:0 12px 30px rgba(0,0,0,.16);overflow:hidden;}
  :root[data-theme="dark"] .suggest{box-shadow:0 12px 30px rgba(0,0,0,.5);}
  .sg{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);min-height:56px;}
  .sg:last-child{border-bottom:none;}
  .sg:active{background:var(--surface2);}
  .sg .s{font-weight:800;font-size:15px;}
  .sg .n{color:var(--muted);font-size:12.5px;margin-top:2px;
    max-width:190px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    direction:ltr;text-align:right;}
  .sg .k{font-size:11px;font-weight:700;padding:4px 8px;border-radius:6px;
    background:var(--neu-wash);color:var(--muted);flex:none;}
  .sg-empty{padding:14px;color:var(--dim);font-size:13.5px;text-align:center;}

  /* tabs */
  .tabs{display:flex;gap:6px;padding:8px 16px 4px;}
  .tab{flex:1;background:transparent;border:1px solid var(--border2);color:var(--muted);
    padding:10px 8px;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;min-height:44px;}
  .tab.active{background:var(--txt);color:var(--bg);border-color:var(--txt);}
  .live{display:flex;align-items:center;justify-content:center;gap:6px;
    color:var(--dim);font-size:12px;padding:8px 16px 0;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--up);}
  .dot.off{background:var(--dim);}
  .dot.on{animation:pulse 1.8s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* cards */
  .list{padding:8px 14px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:14px 15px;margin:10px 0;cursor:pointer;position:relative;overflow:hidden;
    display:flex;gap:8px;box-shadow:var(--shadow);
    transition:transform .09s,box-shadow .15s;user-select:none;-webkit-touch-callout:none;touch-action:pan-y;}
  .card:active{transform:scale(.988);}
  .card.dragging{z-index:20;transition:none;cursor:grabbing;border-color:var(--brand);
    box-shadow:0 16px 36px rgba(0,0,0,.26);touch-action:none;}
  :root[data-theme="light"] .card.dragging{box-shadow:0 16px 36px rgba(11,14,17,.18);}
  .card .strip{position:absolute;top:0;bottom:0;inset-inline-start:0;width:4px;}
  .cmain{flex:1;min-width:0;}
  .cside{display:flex;flex-direction:column;align-items:center;gap:8px;flex:none;}
  .mini{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
    color:var(--dim);background:transparent;border:none;cursor:pointer;font-size:14px;}
  .mini:active{background:var(--surface2);color:var(--txt);}
  .hint{color:var(--dim);font-size:11.5px;text-align:center;padding:6px 16px 0;}

  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .sym{font-weight:800;font-size:19px;letter-spacing:.2px;}
  .cname{color:var(--muted);font-size:12.5px;margin-top:2px;max-width:150px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:ltr;text-align:right;}
  .price{text-align:start;}
  .price .p{font-weight:700;font-size:17px;border-radius:6px;padding:0 3px;transition:background .5s;}
  .price .ch{font-size:12.5px;margin-top:2px;font-weight:600;}
  .up{color:var(--up);} .down{color:var(--down);}
  .ch{direction:ltr;unicode-bidi:isolate;}
  .flash-up{background:var(--up-wash);} .flash-dn{background:var(--down-wash);}

  .reco-row{display:flex;align-items:center;justify-content:space-between;margin-top:13px;gap:10px;}
  .badge{display:flex;align-items:center;gap:10px;min-width:0;}
  .score-pill{min-width:44px;height:42px;padding:0 10px;border-radius:11px;display:grid;place-items:center;
    font-weight:800;font-size:19px;color:var(--pill-txt);line-height:1;}
  .reco-txt{font-weight:800;font-size:15px;}
  .reco-sub{color:var(--muted);font-size:11.5px;margin-top:2px;}
  .counts{display:flex;gap:5px;flex:none;}
  .cnt{display:flex;align-items:center;gap:3px;font-size:11.5px;font-weight:800;
    padding:5px 7px;border-radius:7px;line-height:1;}
  .cnt.b{background:var(--up-wash);color:var(--up);}
  .cnt.n{background:var(--neu-wash);color:var(--muted);}
  .cnt.s{background:var(--down-wash);color:var(--down);}

  .sk{position:relative;overflow:hidden;background:var(--surface3);border-radius:7px;}
  .sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
    background:linear-gradient(90deg,transparent,rgba(128,128,128,.14),transparent);animation:sh 1.3s infinite;}
  @keyframes sh{100%{transform:translateX(100%);}}

  .empty{text-align:center;color:var(--muted);padding:40px 30px 10px;}
  .empty .em{width:58px;height:58px;margin:0 auto 14px;border-radius:16px;
    background:linear-gradient(150deg,#0E1B2E,#0A0F1A);display:grid;place-items:center;}
  .empty h3{color:var(--txt);font-size:17px;margin:0 0 6px;font-weight:700;}
  .empty p{font-size:13.5px;line-height:1.6;margin:0 0 16px;}
  .chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .chip{background:var(--surface);border:1px solid var(--border2);color:var(--txt);
    padding:10px 16px;border-radius:20px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:var(--shadow);}
  .chip:active{transform:scale(.94);}
  .err{background:var(--down-wash);border:1px solid var(--down);color:var(--down);
    border-radius:12px;padding:12px 14px;margin:8px 16px;font-size:13.5px;}

  /* detail */
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:600;
    font-size:15px;padding:14px 16px;cursor:pointer;min-height:44px;}
  .d-head{padding:2px 20px 4px;}
  .d-sym{font-size:29px;font-weight:800;letter-spacing:.3px;}
  .d-name{color:var(--muted);font-size:14px;margin-top:2px;direction:ltr;text-align:right;}
  .d-price{display:flex;align-items:baseline;gap:12px;margin-top:10px;flex-wrap:wrap;}
  .d-price .p{font-size:30px;font-weight:800;letter-spacing:-.5px;}
  .d-price .ch{font-size:16px;font-weight:700;}

  /* chart */
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;
    margin:14px 16px;padding:14px 12px 12px;box-shadow:var(--shadow);}
  .chart-box{position:relative;}
  .chart{width:100%;height:auto;display:block;touch-action:none;}
  .chart-lbl{position:absolute;top:-2px;inset-inline-start:0;font-size:12px;color:var(--muted);
    background:var(--surface2);border-radius:7px;padding:4px 8px;pointer-events:none;
    white-space:nowrap;direction:ltr;}
  .ranges{display:flex;gap:3px;margin-top:12px;}
  .rg{flex:1;min-width:0;background:transparent;border:none;color:var(--muted);font-size:11.5px;
    font-weight:700;padding:9px 2px;border-radius:9px;cursor:pointer;min-height:40px;
    white-space:nowrap;letter-spacing:-.2px;}
  .rg.active{background:var(--surface2);color:var(--txt);}
  .chart-msg{color:var(--dim);font-size:13px;text-align:center;padding:34px 10px;}

  /* "מה היה קורה אם היית מקשיב" */
  .bt-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;
    margin:14px 16px;padding:16px 15px 14px;box-shadow:var(--shadow);}
  .bt-head{font-weight:800;font-size:16.5px;letter-spacing:-.2px;}
  .bt-sub{color:var(--muted);font-size:12px;margin-top:4px;line-height:1.55;}
  .bt-tabs{display:flex;gap:4px;margin:13px 0;}
  .bt-tab{flex:1;min-width:0;background:var(--surface2);border:none;color:var(--muted);
    font-size:11.5px;font-weight:700;padding:9px 2px;border-radius:9px;cursor:pointer;
    min-height:38px;white-space:nowrap;letter-spacing:-.2px;}
  .bt-tab.active{background:var(--txt);color:var(--bg);}
  .bt-tab:disabled{opacity:.3;cursor:default;}
  .bt-grid{display:flex;gap:9px;}
  .bt-col{flex:1;min-width:0;background:var(--surface2);border:1.5px solid transparent;
    border-radius:13px;padding:12px 11px;}
  .bt-col.w{border-color:var(--brand);background:var(--surface3);}
  .bt-lbl{font-size:12px;color:var(--muted);font-weight:700;}
  .bt-pct{font-size:23px;font-weight:800;letter-spacing:-.5px;margin-top:5px;
    direction:ltr;text-align:right;}
  .bt-val{font-size:11px;color:var(--muted);margin-top:3px;direction:ltr;text-align:right;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bt-bar{height:5px;background:var(--surface3);border-radius:4px;margin-top:9px;overflow:hidden;}
  .bt-col.w .bt-bar{background:var(--border2);}
  .bt-bar b{display:block;height:100%;border-radius:4px;}
  .bt-verdict{margin-top:12px;padding:11px 12px;border-radius:11px;font-size:13.5px;
    font-weight:700;line-height:1.55;}
  .bt-verdict.good{background:var(--up-wash);color:var(--up);}
  .bt-verdict.bad{background:var(--down-wash);color:var(--down);}
  .bt-verdict.tie{background:var(--neu-wash);color:var(--muted);}
  .bt-stats{color:var(--dim);font-size:11.5px;margin-top:10px;line-height:1.8;}
  .bt-stats b{color:var(--muted);font-weight:800;}
  .lt{direction:ltr;unicode-bidi:isolate;}   /* מספרים ואחוזים בתוך משפט בעברית */
  .bt-note{color:var(--dim);font-size:11px;margin-top:12px;line-height:1.6;
    border-top:1px solid var(--border);padding-top:10px;}

  /* score (number only — no gauge) */
  .score-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;
    margin:14px 16px;padding:18px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:16px;}
  .score-big{font-size:44px;font-weight:800;line-height:1;letter-spacing:-1.5px;flex:none;}
  .score-big small{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-top:4px;letter-spacing:0;}
  .score-mid{flex:1;min-width:0;}
  .score-reco{font-size:21px;font-weight:800;letter-spacing:-.3px;}
  .score-sub{color:var(--muted);font-size:12.5px;margin-top:3px;}
  .summary{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
  .scnt{display:flex;align-items:center;gap:5px;padding:7px 11px;border-radius:9px;
    font-weight:800;font-size:13px;line-height:1;}
  .scnt small{font-weight:600;font-size:11px;opacity:.85;}
  .scnt.b{background:var(--up-wash);color:var(--up);}
  .scnt.n{background:var(--neu-wash);color:var(--muted);}
  .scnt.s{background:var(--down-wash);color:var(--down);}

  .sec-title{font-size:12px;color:var(--dim);font-weight:800;padding:16px 22px 2px;
    letter-spacing:.5px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
  .sec-title .mc{font-weight:700;letter-spacing:0;text-transform:none;font-size:12px;}
  .sec-title .mc b{color:var(--up);} .sec-title .mc i{color:var(--muted);font-style:normal;} .sec-title .mc u{color:var(--down);text-decoration:none;}
  .ind{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin:8px 16px;
    padding:14px 15px;box-shadow:var(--shadow);}
  .ind-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .ind-name{font-weight:700;font-size:15px;}
  .ind-val{color:var(--muted);font-size:13px;margin-top:3px;}
  .ind-sig{font-size:12.5px;font-weight:800;padding:6px 11px;border-radius:8px;white-space:nowrap;
    display:flex;align-items:center;gap:5px;flex:none;}
  .sig-buy{background:var(--up-wash);color:var(--up);}
  .sig-sell{background:var(--down-wash);color:var(--down);}
  .sig-neu{background:var(--neu-wash);color:var(--muted);}
  .ind-expl{color:var(--dim);font-size:12px;margin-top:8px;line-height:1.6;}
  .wbar{height:5px;background:var(--surface3);border-radius:4px;margin-top:10px;position:relative;overflow:hidden;}
  .wbar i{position:absolute;top:0;bottom:0;inset-inline-start:50%;width:1px;background:var(--dim);}
  .wbar b{position:absolute;top:0;bottom:0;border-radius:4px;}
  .disclaimer{color:var(--dim);font-size:11.5px;line-height:1.7;text-align:center;padding:20px 26px 6px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark">
      <svg width="19" height="19" viewBox="0 0 100 100" aria-hidden="true">
        <g fill="#00D37F"><rect x="40" y="15" width="20" height="70" rx="10"/><rect x="26" y="29" width="48" height="20" rx="10"/></g>
      </svg>
    </div>
    <div class="wordmark"><span class="t">t</span>rade</div>
  </div>
  <div class="hbtns">
    <button class="icon-btn" id="themeBtn" aria-label="מצב תצוגה"></button>
    <button class="icon-btn" id="refreshBtn" aria-label="רענון">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
    </button>
  </div>
</header>

<div id="listView">
  <div class="searchwrap">
    <div class="searchrow">
      <input id="symInput" placeholder="חיפוש מניה או מדד…" autocomplete="off" autocapitalize="characters" autocorrect="off" spellcheck="false">
      <button id="addBtn">הוסף</button>
    </div>
    <div id="suggest" class="suggest hidden"></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="all">הכול</button>
    <button class="tab" data-tab="index">מדדים</button>
    <button class="tab" data-tab="stock">מניות</button>
  </div>
  <div class="live"><span class="dot off" id="liveDot"></span><span id="liveTxt">טוען…</span></div>
  <div class="hint hidden" id="dragHint">לחיצה ארוכה על מניה — וגוררים אותה למעלה או למטה</div>

  <div id="errBox"></div>
  <div id="cards" class="list"></div>
  <div id="emptyState" class="empty hidden">
    <div class="em"><svg width="28" height="28" viewBox="0 0 100 100"><g fill="#00D37F"><rect x="40" y="15" width="20" height="70" rx="10"/><rect x="26" y="29" width="48" height="20" rx="10"/></g></svg></div>
    <h3>אין כאן כלום עדיין</h3>
    <p>הוסף מניה או מדד כדי לראות גרף מחיר וניתוח קנייה/מכירה.</p>
    <div class="chips">
      <div class="chip" data-add="AAPL">AAPL</div>
      <div class="chip" data-add="MSFT">MSFT</div>
      <div class="chip" data-add="NVDA">NVDA</div>
      <div class="chip" data-add="SPY">SPY</div>
    </div>
  </div>
  <div class="disclaimer">
    ניתוח טכני ממוחשב למטרות מידע והשכלה בלבד — אינו ייעוץ השקעות או המלצה לפעולה.
    כל החלטת השקעה באחריותך. השקעה בשוק ההון כרוכה בסיכון להפסד.
  </div>
</div>

<div id="detailView" class="hidden"></div>

<script>
(function(){
  'use strict';
  var LS_LIST='mm_watchlist', LS_THEME='mm_theme';
  var STARTERS=['AAPL','MSFT','NVDA'];
  var REFRESH_OPEN=30000, REFRESH_CLOSED=300000;
  var state={ list:[], analyses:{}, tab:'all', busy:false, marketOpen:false,
              lastPrice:{}, detail:null, range:'1d', timer:null, sgTimer:null,
              es:null, streaming:false, bt:null, btRange:'1y' };

  var GROUPS=[
    {title:'מגמה וממוצעים', keys:['sma200','goldencross','momentum']},
    {title:'מומנטום ותנודתיות', keys:['macd','rsi','stoch','bollinger','obv']}
  ];
  var RANGES=[{k:'1h',t:'שעה'},{k:'1d',t:'יום'},{k:'1w',t:'שבוע'},{k:'1m',t:'חודש'},
              {k:'1y',t:'שנה'},{k:'5y',t:'5 שנים'},{k:'max',t:'מקס'}];
  var EXPL={
    sma200:'הקו המפריד בין מגמת עלייה לירידה ארוכת טווח. מחיר מעל הממוצע נחשב חיובי.',
    goldencross:'כשהממוצע הקצר (50) חוצה מעל הארוך (200) — סימן קלאסי לתחילת מגמת עלייה.',

  var SUN='<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>';

  function esc(x){ return (x==null?'':(''+x)).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];}); }
  function loadList(){ try{ state.list=JSON.parse(localStorage.getItem(LS_LIST)||'[]'); }catch(e){ state.list=[]; } }

  // ---------- autocomplete ----------
  function hideSuggest(){ document.getElementById('suggest').classList.add('hidden'); }
  function showSuggest(items, q){

      box.innerHTML='<div class="sg-empty">לא נמצא "'+esc(q)+'"</div>';

        '<div class="n">'+esc(i.name||'')+'</div></div>'+
        '<div class="k">'+(i.kind==='index'?'מדד':esc(i.exchange||'מניה'))+'</div></div>';
    }).join('');
    box.classList.remove('hidden');
    Array.prototype.forEach.call(box.querySelectorAll('[data-pick]'), function(el){
      el.addEventListener('click', function(){ addSymbol(el.getAttribute('data-pick')); hideSuggest(); });
    });

  function onType(){
    var q=(document.getElementById('symInput').value||'').trim();
    clearTimeout(state.sgTimer);
    // כל חיפוש עולה בקשה אצל ספק הנתונים — לכן מחכים שיפסיק להקליד, ומאות אחת אין טעם
    if(q.length<2){ hideSuggest(); return; }
    state.sgTimer=setTimeout(function(){
      apiSearch(q).then(function(items){
        if((document.getElementById('symInput').value||'').trim()!==q) return;
        showSuggest(items||[], q);
      }).catch(hideSuggest);
    }, 400);
  }

  // ---------- list ----------
  function visible(){
    return state.list.filter(function(s){
      if(state.tab==='all') return true;
      var a=state.analyses[s];
      return a && a.ok && a.kind===state.tab;
    });
  }
  function skeleton(sym){
    return '<div class="cmain"><div class="card-top"><div><div class="sym">'+esc(sym)+'</div>'+
      '<div class="sk" style="width:96px;height:12px;margin-top:7px"></div></div>'+
      '<div class="sk" style="width:70px;height:34px"></div></div>'+

  function render(){
    var wrap=document.getElementById('cards'), empty=document.getElementById('emptyState');
    var list=visible(), hint=document.getElementById('dragHint');
    if(hint) hint.classList.toggle('hidden', list.length<2);

            '<div class="price"><div class="p num'+fl+'">$'+a.price.toFixed(2)+'</div>'+
              '<div class="ch '+chCls+' num">'+arr+' '+sg+a.change.toFixed(2)+' ('+sg+a.changePct.toFixed(2)+'%)</div></div>'+
          '</div>'+
          '<div class="reco-row">'+

              '<div style="min-width:0"><div class="reco-txt" style="color:'+col+'">'+esc(a.recommendation)+'</div>'+
                '<div class="reco-sub">ציון משוקלל · 8 אינדיקטורים</div></div></div>'+
            '<div class="counts"><span class="cnt b num">▲'+a.agreement.buy+'</span>'+

    Array.prototype.forEach.call(wrap.querySelectorAll('.card'), function(c){
      c.addEventListener('click', function(e){
        if(justDragged) return;                 // בדיוק גררנו — לא לפתוח את המניה
        if(e.target.closest('[data-del]')) return;
        openDetail(c.getAttribute('data-sym'));

    initDrag();

    setTimeout(function(){

  // ---------- שינוי סדר בלחיצה ארוכה ----------
  // גלילה רגילה עובדת כרגיל. מחזיקים את האצבע ~0.4 שניות על מניה — היא "נתלשת"
  // (עם רטט קצר) ואז גוררים אותה למעלה או למטה. תזוזה לפני כן = גלילה, לא גרירה.
  var HOLD_MS=380, SLOP=10, EDGE=76, SCROLL_STEP=9;
  var drag=null, holdTimer=null, cand=null, startX=0, startY=0, justDragged=false;

  function cancelHold(){ clearTimeout(holdTimer); holdTimer=null; cand=null; }

  function beginDrag(card, y){
    drag={ card:card, wrap:document.getElementById('cards'), baseY:y, lastY:y, dir:0 };
    card.classList.add('dragging');
    card.style.transform='scale(1.03)';
    if(navigator.vibrate){ try{ navigator.vibrate(24); }catch(e){} }
    requestAnimationFrame(edgeLoop);
  }
  function moveDrag(y){
    drag.lastY=y;
    drag.card.style.transform='translateY('+(y-drag.baseY)+'px) scale(1.03)';
    reorder(y);
    var h=window.innerHeight;
    drag.dir = (y<EDGE) ? -1 : (y>h-EDGE ? 1 : 0);   // גרירה לקצה המסך — הרשימה נגללת לבד
  }
  function reorder(y){
    var wrap=drag.wrap, card=drag.card, cards=wrap.querySelectorAll('.card');
    for(var i=0;i<cards.length;i++){
      var o=cards[i];
      if(o===card) continue;
      var r=o.getBoundingClientRect(), mid=r.top+r.height/2;
      var below=(card.compareDocumentPosition(o) & Node.DOCUMENT_POSITION_FOLLOWING);
      if(below && y>mid){ wrap.insertBefore(card, o.nextSibling); rebase(y); return; }
      if(!below && y<mid){ wrap.insertBefore(card, o); rebase(y); return; }
    }
  }
  function rebase(y){ drag.baseY=y; drag.card.style.transform='scale(1.03)'; }
  function edgeLoop(){
    if(!drag) return;
    if(drag.dir){ window.scrollBy(0, drag.dir*SCROLL_STEP); reorder(drag.lastY); }
    requestAnimationFrame(edgeLoop);
  }
  function endDrag(){
    if(!drag) return;
    var wrap=drag.wrap, card=drag.card;
    card.classList.remove('dragging'); card.style.transform='';
    drag=null;
    justDragged=true; setTimeout(function(){ justDragged=false; }, 400);
    var order=Array.prototype.map.call(wrap.querySelectorAll('.card'), function(c){
      return c.getAttribute('data-sym');
    });
    // שומר את הסדר החדש, כולל פריטים שמוסתרים בלשונית הנוכחית
    var rest=state.list.filter(function(s){ return order.indexOf(s)<0; });
    state.list=order.concat(rest);
    saveList();
  }

  function initDrag(){
    var wrap=document.getElementById('cards');
    if(wrap.__dragWired) return;   // הכרטיסים מצוירים מחדש, המאזינים נרשמים פעם אחת
    wrap.__dragWired=true;

    wrap.addEventListener('pointerdown', function(e){
      if(drag || (e.pointerType==='mouse' && e.button!==0)) return;
      if(e.target.closest('[data-del]')) return;
      var card=e.target.closest('.card');
      if(!card || !card.getAttribute('data-sym') || state.list.length<2) return;
      cand=card; startX=e.clientX; startY=e.clientY;
      clearTimeout(holdTimer);
      holdTimer=setTimeout(function(){
        if(cand) beginDrag(cand, startY);
        cand=null;
      }, HOLD_MS);
    });

    document.addEventListener('pointermove', function(e){
      if(drag){ moveDrag(e.clientY); return; }
      if(!cand) return;
      if(Math.abs(e.clientY-startY)>SLOP || Math.abs(e.clientX-startX)>SLOP) cancelHold(); // זו גלילה
    });
    document.addEventListener('pointerup', function(){ cancelHold(); endDrag(); });
    document.addEventListener('pointercancel', function(){ cancelHold(); endDrag(); });
    // בזמן גרירה הדף עצמו לא זז — רק הכרטיס
    document.addEventListener('touchmove', function(e){ if(drag) e.preventDefault(); }, {passive:false});
    window.addEventListener('scroll', function(){ if(!drag) cancelHold(); }, {passive:true});
  }

  // ---------- chart ----------
  function chartSVG(pts){
    var W=340,H=124,P=8, n=pts.length;
    if(n<2) return '<div class="chart-msg">אין מספיק נתונים לגרף.</div>';
    var vals=pts.map(function(p){return p.c;});
    var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
    if(mx===mn){ mx=mn+Math.abs(mn)*0.001+0.01; }
    var up = pts[n-1].c >= pts[0].c;
    var col = up ? 'var(--up)' : 'var(--down)';
    var gid = 'g'+(up?'u':'d');
    function X(i){ return P+(i/(n-1))*(W-2*P); }
    function Y(v){ return P+(1-(v-mn)/(mx-mn))*(H-2*P); }
    var line='', area='M'+X(0).toFixed(1)+' '+(H-P);
    pts.forEach(function(p,i){
      var x=X(i).toFixed(1), y=Y(p.c).toFixed(1);
      line+=(i?'L':'M')+x+' '+y+' '; area+=' L'+x+' '+y;
    });
    area+=' L'+X(n-1).toFixed(1)+' '+(H-P)+' Z';
    var by=Y(pts[0].c).toFixed(1);
    return '<svg class="chart" viewBox="0 0 '+W+' '+H+'" id="chartSvg">'+
      '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'+
        '<stop offset="0" stop-color="'+col+'" stop-opacity=".22"/>'+
        '<stop offset="1" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs>'+
      '<path d="'+area+'" fill="url(#'+gid+')"/>'+
      '<line x1="'+P+'" y1="'+by+'" x2="'+(W-P)+'" y2="'+by+'" stroke="currentColor" stroke-width=".8" stroke-dasharray="3 3" opacity=".28"/>'+
      '<path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
      '<line id="cx" x1="0" y1="'+P+'" x2="0" y2="'+(H-P)+'" stroke="currentColor" stroke-width="1" opacity="0"/>'+
      '<circle id="cdot" r="4" fill="'+col+'" stroke="var(--surface)" stroke-width="2" opacity="0"/>'+
      '</svg><div class="chart-lbl hidden" id="chartLbl"></div>';
  }
  function wireChart(pts){
    var svg=document.getElementById('chartSvg'); if(!svg||pts.length<2) return;
    var cx=document.getElementById('cx'), dot=document.getElementById('cdot'), lbl=document.getElementById('chartLbl');
    var W=340,H=124,P=8,n=pts.length;
    var vals=pts.map(function(p){return p.c;});
    var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
    if(mx===mn){ mx=mn+Math.abs(mn)*0.001+0.01; }
    function X(i){ return P+(i/(n-1))*(W-2*P); }
    function Y(v){ return P+(1-(v-mn)/(mx-mn))*(H-2*P); }
    function at(ev){
      var r=svg.getBoundingClientRect();
      var rel=(ev.clientX-r.left)/r.width;
      if(document.dir==='rtl'||document.documentElement.dir==='rtl'){ /* SVG לא מתהפך */ }
      var i=Math.round(rel*(n-1)); i=Math.max(0,Math.min(n-1,i));
      var p=pts[i], x=X(i), y=Y(p.c);
      cx.setAttribute('x1',x); cx.setAttribute('x2',x); cx.setAttribute('opacity','.3');
      dot.setAttribute('cx',x); dot.setAttribute('cy',y); dot.setAttribute('opacity','1');
      lbl.classList.remove('hidden');
      lbl.textContent='$'+p.c.toFixed(2)+'  ·  '+p.t;
    }
    function off(){ cx.setAttribute('opacity','0'); dot.setAttribute('opacity','0'); lbl.classList.add('hidden'); }
    svg.addEventListener('pointerdown',at); svg.addEventListener('pointermove',function(e){ if(e.buttons||e.pointerType==='touch') at(e); });
    svg.addEventListener('pointerup',off); svg.addEventListener('pointerleave',off); svg.addEventListener('pointercancel',off);
  }
  function loadChart(sym,rng){
    state.range=rng;
    var box=document.getElementById('chartBox');
    if(!box) return;
    box.innerHTML='<div class="sk" style="height:124px"></div>';
    Array.prototype.forEach.call(document.querySelectorAll('.rg'), function(b){
      b.classList.toggle('active', b.getAttribute('data-rg')===rng);
    });
    apiSeries(sym,rng).then(function(r){
      if(state.detail!==sym || state.range!==rng) return;
      if(!r.ok || !r.points || r.points.length<2){
        box.innerHTML='<div class="chart-msg">'+esc(r.reason||'אין נתוני גרף לטווח הזה.')+'</div>'; return;
      }
      box.innerHTML=chartSVG(r.points);
      wireChart(r.points);
    }).catch(function(){
      if(state.detail===sym) box.innerHTML='<div class="chart-msg">שגיאה בטעינת הגרף.</div>';
    });
  }

  // ---------- "מה היה קורה אם היית מקשיב" ----------
  function money(v){ return '$'+Math.round(v).toLocaleString('en-US'); }
  function pctTxt(v){ return (v>=0?'+':'')+v.toFixed(1)+'%'; }
  function upDown(v){ return v>=0 ? 'var(--up)' : 'var(--down)'; }
  function lt(x){ return '<span class="lt">'+x+'</span>'; }   // מספר בתוך משפט עברי

  function btHTML(){
    return '<div class="bt-card">'+
      '<div class="bt-head">מה היה קורה אם היית מקשיב?</div>'+
      '<div class="bt-sub">הרצנו את אותם 8 אינדיקטורים על כל יום בעבר: קונים כשההמלצה הפכה לקנייה, '+
        'מוכרים כשהיא הפכה למכירה — ומשווים למי שפשוט קנה והחזיק.</div>'+
      '<div class="bt-tabs" id="btTabs"></div>'+
      '<div id="btBox"></div>'+
      '<div class="bt-note">הסימולציה מבוססת על מחירי הסגירה בפועל, בלי עמלות ובלי מס. '+
        'ביצועי עבר אינם מבטיחים תוצאה דומה בעתיד.</div>'+
    '</div>';
  }
  function btRender(){
    var tabs=document.getElementById('btTabs'), box=document.getElementById('btBox');
    if(!tabs||!box) return;
    var r=state.bt;
    if(!r){ tabs.innerHTML=''; box.innerHTML='<div class="sk" style="height:160px"></div>'; return; }
    if(!r.ok || !r.periods){
      tabs.innerHTML='';
      box.innerHTML='<div class="chart-msg">'+esc(r.reason||'לא הצלחנו לחשב.')+'</div>';
      return;
    }

    tabs.innerHTML=r.periods.map(function(p){
      return '<button class="bt-tab'+(p.key===state.btRange?' active':'')+'" data-bt="'+esc(p.key)+'"'+
        (p.available?'':' disabled')+'>'+esc(p.label)+'</button>';
    }).join('');
    Array.prototype.forEach.call(tabs.querySelectorAll('[data-bt]'), function(b){
      b.addEventListener('click', function(){ state.btRange=b.getAttribute('data-bt'); btRender(); });
    });

    var p=null;
    r.periods.forEach(function(x){ if(x.key===state.btRange) p=x; });
    if(!p) p=r.periods[0];
    if(!p.available){
      box.innerHTML='<div class="chart-msg">אין מספיק היסטוריה למניה הזו כדי לבדוק '+esc(p.label)+' אחורה.</div>';
      return;
    }

    var diff=p.strategy-p.buyHold;
    var tie=Math.abs(diff)<0.05, win=(!tie && diff>0);
    var mx=Math.max(Math.abs(p.strategy), Math.abs(p.buyHold), 1);
    function bar(v){ return Math.max(4, Math.abs(v)/mx*100); }

    var gap=lt(Math.abs(diff).toFixed(1)+'%');
    var vcls, verdict;
    if(tie){ vcls='tie'; verdict='יצא בדיוק אותו דבר — ההמלצה הייתה להחזיק לאורך כל התקופה.'; }
    else if(win){ vcls='good'; verdict='ההמלצות הרוויחו '+gap+' יותר מאשר פשוט לקנות ולהחזיק.'; }
    else { vcls='bad'; verdict='עדיף היה פשוט לקנות ולהחזיק — ההמלצות פיגרו ב-'+gap+'.'; }

    var rng='הציון נע בין '+lt(p.minScore)+' ל-'+lt(p.maxScore);
    var acts;
    if(p.trades===0){
      // אפס פעולות זה לא באג — פשוט הציון אף פעם לא ירד לתחום המכירה. מראים למה.
      acts='<b>אף פעם לא היה צריך למכור.</b> '+rng+', ואף פעם לא ירד אל מתחת ל-'+
           lt(p.sellAt)+' — הסף שבו ההמלצה הופכת למכירה. לכן "להקשיב" פירושו פשוט להישאר בפנים, '+
           'ולכן שתי התוצאות זהות.';
    } else {
      var word = p.trades===1 ? 'פעולת קנייה/מכירה אחת' : lt(p.trades)+' פעולות קנייה/מכירה';
      acts=word+' · '+lt(Math.round(p.timeIn)+'%')+' מהזמן היית בתוך השוק · '+rng;
    }

    box.innerHTML=
      '<div class="bt-grid">'+
        '<div class="bt-col'+(win?' w':'')+'">'+
          '<div class="bt-lbl">לפי ההמלצות</div>'+
          '<div class="bt-pct num" style="color:'+upDown(p.strategy)+'">'+pctTxt(p.strategy)+'</div>'+
          '<div class="bt-val num">'+money(r.start)+' → '+money(p.stratVal)+'</div>'+
          '<div class="bt-bar"><b style="width:'+bar(p.strategy)+'%;background:'+upDown(p.strategy)+'"></b></div>'+
        '</div>'+
        '<div class="bt-col'+((!win&&!tie)?' w':'')+'">'+
          '<div class="bt-lbl">קנייה והחזקה</div>'+
          '<div class="bt-pct num" style="color:'+upDown(p.buyHold)+'">'+pctTxt(p.buyHold)+'</div>'+
          '<div class="bt-val num">'+money(r.start)+' → '+money(p.holdVal)+'</div>'+
          '<div class="bt-bar"><b style="width:'+bar(p.buyHold)+'%;background:'+upDown(p.buyHold)+'"></b></div>'+
        '</div>'+
      '</div>'+
      '<div class="bt-verdict '+vcls+'">'+verdict+'</div>'+
      '<div class="bt-stats">'+
        acts+'<br>'+
        'הירידה הכי גדולה בדרך: '+lt(p.maxDD.toFixed(0)+'%')+
        ' (בקנייה והחזקה: '+lt(p.holdDD.toFixed(0)+'%')+')'+
      '</div>';
  }
  function loadBacktest(sym){
    state.bt=null; btRender();
    apiBacktest(sym).then(function(r){
      if(state.detail!==sym) return;
      state.bt=r; btRender();
    }).catch(function(){
      if(state.detail!==sym) return;
      state.bt={ok:false, reason:'שגיאה בחישוב.'}; btRender();
    });
  }

  // ---------- detail ----------
  function indRow(i){
    var sc=i.signal==='buy'?'sig-buy':i.signal==='sell'?'sig-sell':'sig-neu';
    var st=i.signal==='buy'?'קנייה':i.signal==='sell'?'מכירה':'ניטרלי';
    var gl=i.signal==='buy'?'▲':i.signal==='sell'?'▼':'▬';
    var b=i.score>=0
      ? 'inset-inline-start:50%;width:'+Math.min(50,i.score*50)+'%;background:var(--up);'
      : 'inset-inline-end:50%;width:'+Math.min(50,-i.score*50)+'%;background:var(--down);';
    return '<div class="ind"><div class="ind-top"><div style="min-width:0">'+
      '<div class="ind-name">'+esc(i.name)+'</div><div class="ind-val num">'+esc(i.detail||'')+'</div></div>'+
      '<div class="ind-sig '+sc+'">'+gl+' '+st+'</div></div>'+
      (EXPL[i.key]?'<div class="ind-expl">'+EXPL[i.key]+'</div>':'')+
      '<div class="wbar"><i></i><b style="'+b+'"></b></div></div>';
  }
  function openDetail(sym, fromPop){
    var a=state.analyses[sym];
    if(!a||!a.ok) return;
    state.detail=sym;
    if(!fromPop) history.pushState({d:sym}, '', '#'+sym);
    var col=band(a.score100);
    var chCls=a.change>=0?'up':'down', sg=a.change>=0?'+':'', arr=a.change>=0?'▲':'▼';
    var byKey={}; a.indicators.forEach(function(i){ byKey[i.key]=i; });
    var used={}, sections='';
    GROUPS.forEach(function(g){
      var rows='', nb=0,nn=0,ns=0;
      g.keys.forEach(function(k){ var i=byKey[k]; if(!i) return; used[k]=1; rows+=indRow(i);
        if(i.signal==='buy')nb++; else if(i.signal==='sell')ns++; else nn++; });
      if(rows) sections+='<div class="sec-title">'+g.title+'<span class="mc"><b>▲'+nb+'</b> · <i>'+nn+'</i> · <u>▼'+ns+'</u></span></div>'+rows;
    });
    a.indicators.filter(function(i){ return !used[i.key]; }).forEach(function(i){ sections+=indRow(i); });

    var d=document.getElementById('detailView');
    d.innerHTML=
      '<div class="back" id="backBtn">‹ חזרה</div>'+
      '<div class="d-head"><div class="d-sym">'+esc(a.symbol)+'</div><div class="d-name">'+esc(a.name||'')+'</div>'+
        '<div class="d-price"><div class="p num">$'+a.price.toFixed(2)+'</div>'+
          '<div class="ch '+chCls+' num">'+arr+' '+sg+a.change.toFixed(2)+' ('+sg+a.changePct.toFixed(2)+'%)</div></div></div>'+
      '<div class="chart-card"><div class="chart-box" id="chartBox"></div>'+
        '<div class="ranges">'+RANGES.map(function(r){
            return '<button class="rg'+(r.k===state.range?' active':'')+'" data-rg="'+r.k+'">'+r.t+'</button>';
          }).join('')+'</div></div>'+
      '<div class="score-card">'+
        '<div class="score-big num" style="color:'+col+'">'+a.score100+'<small>מתוך 100</small></div>'+
        '<div class="score-mid"><div class="score-reco" style="color:'+col+'">'+esc(a.recommendation)+'</div>'+
          '<div class="score-sub">ציון משוקלל מ-'+a.agreement.total+' אינדיקטורים טכניים</div>'+
          '<div class="summary"><span class="scnt b num">▲ '+a.agreement.buy+' <small>בעד</small></span>'+
            '<span class="scnt n num">'+a.agreement.neutral+' <small>ניטרלי</small></span>'+
            '<span class="scnt s num">▼ '+a.agreement.sell+' <small>נגד</small></span></div></div></div>'+
      btHTML()+
      sections+
      '<div class="disclaimer">ניתוח טכני ממוחשב למטרות מידע בלבד — אינו ייעוץ השקעות. החלטות ההשקעה באחריותך.</div>';

    document.getElementById('listView').classList.add('hidden');
    d.classList.remove('hidden');
    window.scrollTo(0,0);
    Array.prototype.forEach.call(d.querySelectorAll('.rg'), function(b){
      b.addEventListener('click', function(){ loadChart(sym, b.getAttribute('data-rg')); });
    });
    document.getElementById('backBtn').addEventListener('click', function(){ history.back(); });
    loadChart(sym, state.range);
    loadBacktest(sym);
  }
  function closeDetail(){
    state.detail=null;
    var d=document.getElementById('detailView');
    d.classList.add('hidden'); d.innerHTML='';
    document.getElementById('listView').classList.remove('hidden');
    window.scrollTo(0,0);
  }
  window.addEventListener('popstate', function(){ if(state.detail) closeDetail(); });

  // ---------- actions ----------
  function showErr(msg){
    var e=document.getElementById('errBox');
    e.innerHTML='<div class="err">'+esc(msg)+'</div>';
    setTimeout(function(){ e.innerHTML=''; }, 6000);
  }
  function removeSymbol(sym){
    state.list=state.list.filter(function(s){return s!==sym;});
    delete state.analyses[sym]; delete state.lastPrice[sym];
    saveList(); render(); connectStream();
  }
  function addSymbol(sym){
    var inp=document.getElementById('symInput');
    sym=(sym||inp.value||'').trim().toUpperCase().replace(/[^A-Z0-9.\-^]/g,'');
    if(!sym) return;
    hideSuggest(); inp.value='';
    if(state.list.indexOf(sym)>=0) return;
    state.list.push(sym); saveList(); render();
    loadOne(sym).then(connectStream);
  }
  function loadOne(sym){
    return apiAnalyze(sym).then(function(res){
      state.analyses[sym]=res;
      if(res && res.ok && res.marketOpen) state.marketOpen=true;
      render(); updateLive();
    }).catch(function(err){
      state.analyses[sym]={ok:false,symbol:sym,reason:(err&&err.message)||'שגיאה בטעינה'};
      render();
    });
  }
  function refreshAll(){
    if(state.busy || state.list.length===0){ render(); updateLive(); return Promise.resolve(); }
    state.busy=true; state.marketOpen=false;
    var i=0;
    return new Promise(function(done){
      (function next(){
        if(i>=state.list.length){ state.busy=false; updateLive(); done(); return; }
        var sym=state.list[i]; i++;
        loadOne(sym).then(function(){ setTimeout(next, 260); });
      })();
    });
  }
  function updateLive(){
    var dot=document.getElementById('liveDot'), txt=document.getElementById('liveTxt');
    if(!dot) return;
    if(!state.marketOpen){ dot.className='dot off'; txt.textContent='השוק סגור · הנתונים מהסגירה האחרונה'; return; }
    dot.className='dot on';
    txt.textContent = state.streaming
      ? 'בזמן אמת · מתעדכן בכל עסקה'
      : 'השוק פתוח · מתעדכן אוטומטית כל 30 שניות';
  }
  function scheduleRefresh(){
    clearTimeout(state.timer);
    // בזרם חי אין צורך לשאול כל 30 שניות — העדכונים נדחפים אלינו
    var iv = state.streaming ? REFRESH_CLOSED : (state.marketOpen ? REFRESH_OPEN : REFRESH_CLOSED);
    state.timer=setTimeout(function(){
      if(document.visibilityState==='visible') refreshAll();
      scheduleRefresh();
    }, iv);
  }

  // ---------- זרם חי (בזמן אמת) ----------
  function cardOf(sym){
    var cards=document.querySelectorAll('.card');
    for(var i=0;i<cards.length;i++){ if(cards[i].getAttribute('data-sym')===sym) return cards[i]; }
    return null;
  }
  function flash(el, upward){
    if(!el) return;
    el.classList.remove('flash-up','flash-dn'); void el.offsetWidth;
    el.classList.add(upward?'flash-up':'flash-dn');
    setTimeout(function(){ el.classList.remove('flash-up','flash-dn'); }, 700);
  }
  function chTxt(a){
    var sg=a.change>=0?'+':'', arr=a.change>=0?'▲':'▼';
    return arr+' '+sg+a.change.toFixed(2)+' ('+sg+a.changePct.toFixed(2)+'%)';
  }
  function applyLive(u){
    var a=state.analyses[u.symbol];
    if(!a||!a.ok) return;
    var old=a.price;
    a.price=u.price;
    if(u.prevClose) a.prevClose=u.prevClose;
    a.change=u.change; a.changePct=u.changePct;
    if(u.score100){ a.score100=u.score100; a.recommendation=u.recommendation; a.recoKey=u.recoKey; }
    if(u.agreement) a.agreement=u.agreement;
    state.lastPrice[u.symbol]=a.price;

    var col=band(a.score100);
    var card=cardOf(u.symbol);
    if(card){
      var p=card.querySelector('.price .p'), ch=card.querySelector('.price .ch');
      var pill=card.querySelector('.score-pill'), reco=card.querySelector('.reco-txt');
      var strip=card.querySelector('.strip'), cnts=card.querySelectorAll('.cnt');
      if(p){ p.textContent='$'+a.price.toFixed(2); if(old!=null&&old!==a.price) flash(p, a.price>old); }
      if(ch){ ch.textContent=chTxt(a); ch.className='ch num '+(a.change>=0?'up':'down'); }
      if(pill){ pill.textContent=a.score100; pill.style.background=col; }
      if(reco){ reco.textContent=a.recommendation; reco.style.color=col; }
      if(strip){ strip.style.background=col; }
      if(cnts.length===3 && a.agreement){
        cnts[0].textContent='▲'+a.agreement.buy;
        cnts[1].textContent=a.agreement.neutral;
        cnts[2].textContent='▼'+a.agreement.sell;
      }
    }
    if(state.detail===u.symbol){
      var d=document.getElementById('detailView');
      var dp=d.querySelector('.d-price .p'), dch=d.querySelector('.d-price .ch');
      var big=d.querySelector('.score-big'), dreco=d.querySelector('.score-reco');
      var sc=d.querySelectorAll('.scnt');
      if(dp){ dp.textContent='$'+a.price.toFixed(2); if(old!=null&&old!==a.price) flash(dp, a.price>old); }
      if(dch){ dch.textContent=chTxt(a); dch.className='ch num '+(a.change>=0?'up':'down'); }
      if(big){ big.innerHTML=a.score100+'<small>מתוך 100</small>'; big.style.color=col; }
      if(dreco){ dreco.textContent=a.recommendation; dreco.style.color=col; }
      if(sc.length===3 && a.agreement){
        sc[0].innerHTML='▲ '+a.agreement.buy+' <small>בעד</small>';
        sc[1].innerHTML=a.agreement.neutral+' <small>ניטרלי</small>';
        sc[2].innerHTML='▼ '+a.agreement.sell+' <small>נגד</small>';
      }
    }
  }
  function connectStream(){
    if(state.es){ try{ state.es.close(); }catch(e){} state.es=null; }
    state.streaming=false;
    if(!state.list.length || typeof EventSource==='undefined'){ updateLive(); return; }
    try{
      var es=new EventSource('/api/stream?symbols='+encodeURIComponent(state.list.join(',')));
      state.es=es;
      es.onopen=function(){ state.streaming=true; updateLive(); scheduleRefresh(); };
      es.onmessage=function(ev){ try{ applyLive(JSON.parse(ev.data)); }catch(e){} };
      es.onerror=function(){ state.streaming=false; updateLive(); }; // EventSource מתחבר מחדש לבד
    }catch(e){ state.streaming=false; updateLive(); }
  }

  // ---------- wiring ----------
  document.getElementById('addBtn').addEventListener('click', function(){ addSymbol(); });
  document.getElementById('symInput').addEventListener('input', onType);
  document.getElementById('symInput').addEventListener('keydown', function(e){ if(e.key==='Enter'){ addSymbol(); } });
  document.getElementById('symInput').addEventListener('blur', function(){ setTimeout(hideSuggest, 180); });
  document.getElementById('themeBtn').addEventListener('click', function(){
    applyTheme(document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark');
  });
  document.getElementById('refreshBtn').addEventListener('click', function(e){
    var svg=e.currentTarget.querySelector('svg'); if(svg) svg.classList.add('spin');
    refreshAll().then(function(){ if(svg) svg.classList.remove('spin'); });
  });
  Array.prototype.forEach.call(document.querySelectorAll('.tab'), function(t){
    t.addEventListener('click', function(){
      Array.prototype.forEach.call(document.querySelectorAll('.tab'), function(x){ x.classList.remove('active'); });
      t.classList.add('active'); state.tab=t.getAttribute('data-tab'); render();
    });
  });
  Array.prototype.forEach.call(document.querySelectorAll('[data-add]'), function(c){
    c.addEventListener('click', function(){ addSymbol(c.getAttribute('data-add')); });
  });
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState==='visible') refreshAll();
  });

  initTheme();
  loadList();
  if(state.list.length===0){ state.list=STARTERS.slice(); saveList(); }
  render();
  refreshAll().then(function(){ connectStream(); scheduleRefresh(); });
})();
</script>
</body>
</html>
