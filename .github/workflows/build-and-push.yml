name: Build and Push Image

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: version
        run: |
          git fetch --tags --force
          LATEST=$(git tag -l 'v1.*' | sed 's/^v1\.//' | sort -n | tail -1)
          if [ -z "$LATEST" ]; then LATEST=0; fi
          NEXT=$((LATEST + 1))
          echo "tag=1.$NEXT" >> "$GITHUB_OUTPUT"
          echo "git_tag=v1.$NEXT" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/moshe1132767/stock-compass:${{ steps.version.outputs.tag }}
            ghcr.io/moshe1132767/stock-compass:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.git_tag }}
          git push origin ${{ steps.version.outputs.git_tag }}
